- name: fail early on an unmapped architecture
  fail:
    msg: >-
      No Debian package arch mapping for ansible_architecture={{ ansible_architecture }}.
      Add it to roles/raspberry-pi-extra/vars/main.yml (deb_arch) before installing.
  when: ansible_architecture not in deb_arch

- name: install veracrypt
  block:

  - name: install veracrypt dependencies
    package:
      name: "{{ item }}"
      state: latest
    with_items:
      # this wasn't a smooth one-shot install;
      # i had to first run apt-get install --fix-broken
      - pcscd

  - name: download installer
    get_url:
      # NOTE: the "Debian-11" build is pinned; bump it if the target release needs a newer one.
      url: "https://launchpad.net/veracrypt/trunk/1.26.7/+download/veracrypt-console-1.26.7-Debian-11-{{ deb_arch[ansible_architecture] }}.deb"
      dest: /tmp/veracrypt-installer.deb
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
  
  - name: install the deb package
    shell: sudo dpkg -i ./veracrypt-installer.deb
    args:
      chdir: "/tmp"

- name: install resilio sync
  block:

  - name: download installer
    get_url:
      url: "https://download-cdn.resilio.com/2.7.3.1381/Debian/resilio-sync_2.7.3.1381-1_{{ deb_arch[ansible_architecture] }}.deb"
      dest: /tmp/resilio-installer.deb
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
  
  - name: install the deb package
    shell: sudo dpkg -i ./resilio-installer.deb
    args:
      chdir: "/tmp"

