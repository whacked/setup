# Address layer for one network: host -> IP only.
#
# Copy this file per network you operate on (e.g. inventory/home.ini,
# inventory/lab.ini) and change ONLY the ansible_host values. The same host
# names recur across every network file; identity (model + capabilities) lives
# in ../host_vars/<host>.yml and is shared. Then run:
#   ansible-playbook -i inventory/home.ini site.yml
#
# Names and IPs below are placeholders (RFC 5737 documentation range).

[pi_hosts]
example-pi4      ansible_host=192.0.2.10
example-pi3      ansible_host=192.0.2.11
example-zero2w   ansible_host=192.0.2.12
example-renegade ansible_host=192.0.2.13   # ansible_user differs? set it on the line or in host_vars

[pi_hosts:vars]
ansible_user=pi
ansible_python_interpreter=/usr/bin/python3
