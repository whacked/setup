# Single data-driven play for every single-board computer (Pi + Pi-compatible).
#
#   ansible-playbook -i inventory/<network>.ini site.yml
#
# What each board IS and HAS lives in host_vars/<host>.yml (model + capabilities),
# which is network-independent. The board's address for the current network lives
# in inventory/<network>.ini. OS release and CPU architecture are read from facts,
# never declared, so a re-imaged board still provisions correctly.
---
- hosts: pi_hosts
  become: true
  roles:
    - raspberry-pi-basic            # base setup, always applied

  tasks:
    - name: warn on unknown capabilities (typos / missing role mapping)
      debug:
        msg: >-
          Host declares capabilities with no entry in capability_roles, they
          will be skipped: {{ capabilities | difference(capability_roles.keys() | list) }}
      when: capabilities | difference(capability_roles.keys() | list) | length > 0

    - name: apply roles for declared capabilities
      include_role:
        name: "{{ item }}"
        # Propagate the tag to the included role's own tasks so a tag-scoped run
        # (`--tags capabilities`) actually executes them, not just the include.
        apply:
          tags:
            - capabilities
      # Iterate capability_roles key order (not the host's list order) so role
      # application order is deterministic and identical across hosts. select('in')
      # keeps that order; unknown capabilities are filtered out (warned above).
      loop: >-
        {{ capability_roles.keys() | list
           | select('in', capabilities)
           | map('extract', capability_roles) | flatten | unique | list }}
      # Tagged so capability roles can be (re)applied without the base role, e.g.
      #   ansible-playbook -i inventory/<net>.ini site.yml -l <host> --tags capabilities
      tags:
        - capabilities
